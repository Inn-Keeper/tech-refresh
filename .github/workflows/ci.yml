name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.6.5 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run CI gates
        run: pnpm run ci
