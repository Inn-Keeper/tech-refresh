# Happy-path smoke: sign in (if needed), then visit every tab and assert
# its key affordance renders. Run against Expo Go in the iOS simulator:
#
#   1. pnpm mobile          (Metro running)
#   2. press `i`            (app open in the simulator)
#   3. EMAIL=you@mail.com PASSWORD=yourpass maestro test apps/mobile/.maestro/smoke.yaml
#
# Credentials are only used when the sign-in screen is visible — a persisted
# session skips that block entirely.
#
# GOTCHA: if maestro hangs silently right after its "System Info" banner, check
# for a non-ADB process listening in the Android emulator port range —
#   lsof -nP -iTCP:5555-5685 -sTCP:LISTEN
# Native Instruments' NTKDaemon binds a port there; maestro's Android discovery
# connects to it and blocks forever waiting for an ADB reply. Kill the daemon
# (it relaunches at login) and maestro proceeds to iOS discovery instantly.
appId: host.exp.Exponent
---
- launchApp
# Expo Go opens on its own home screen — deep-link into the project on Metro.
- openLink: exp://127.0.0.1:8081
- extendedWaitUntil:
    visible:
      text: ".*(Sign in|Drill weakest).*"
    timeout: 30000

- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn: "you@email.com" # matches the placeholder text of the email input
      - inputText: ${EMAIL}
      - tapOn: "password"
      - inputText: ${PASSWORD}
      - tapOn: "Sign in"

# Prep tab: stats bar and at least one quiz card are up.
- extendedWaitUntil:
    visible: ".*Drill weakest.*"
    timeout: 20000
- assertVisible: ".*XP.*"

# Stories tab.
- tapOn: "Stories"
- assertVisible: ".*My stories.*"

# Arch Board tab: palette and evaluate button render.
- tapOn: "Arch Board"
- assertVisible: "Evaluate"
- assertVisible: ".*Payment end-to-end.*"

# Quest tab (hiring pipeline).
- tapOn: "Quest"
- assertVisible: ".*Add contact.*"
